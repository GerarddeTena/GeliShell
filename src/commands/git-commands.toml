[[commands]]
name        = "git-clone"
description = "Clone a repository into a new directory"
category    = "git"
translate   = { bash = { exact = "git clone", suggestions = ["git clone <url>"] }, zsh = { exact = "git clone", suggestions = ["git clone <url>"] }, fish = { exact = "git clone", suggestions = ["git clone <url>"] }, powershell = { exact = "git clone", suggestions = ["git clone <url>"] }, cmd = { exact = "git clone", suggestions = ["git clone <url>"] } }

[[commands.flags]]
canonical  = "--depth"
bash       = "--depth"
zsh        = "--depth"
fish       = "--depth"
powershell = "--depth"
cmd        = "--depth"

[[commands.flags]]
canonical  = "--branch"
bash       = "-b"
zsh        = "-b"
fish       = "-b"
powershell = "-b"
cmd        = "-b"

