category    = "file-ops"
translate   = { bash = { exact = "touch", suggestions = ["install -m 644 /dev/null"] }, zsh = { exact = "touch", suggestions = ["install -m 644 /dev/null"] }, fish = { exact = "touch", suggestions = ["install -m 644 /dev/null"] }, powershell = { exact = "New-Item -ItemType File", suggestions = ["ni -ItemType File", "echo $null >"] }, cmd = { exact = "type nul >", suggestions = ["copy nul"] } }

# ──────────────────────────────────────────────

[[commands]]
