bash       = "-f"
zsh        = "-f"
fish       = "-f"
powershell = "-Force"
cmd        = "/y"

[[commands.flags]]
canonical  = "--verbose"
bash       = "-v"
zsh        = "-v"
fish       = "-v"
powershell = "-Verbose"

# ──────────────────────────────────────────────

