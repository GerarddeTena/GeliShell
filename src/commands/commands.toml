bash       = "-r"
zsh        = "-r"
fish       = "-r"
powershell = "-Recurse"
cmd        = "/s"

[[commands.flags]]
canonical  = "--force"
bash       = "-f"
zsh        = "-f"
fish       = "-f"
powershell = "-Force"
cmd        = "/f"

[[commands.flags]]
