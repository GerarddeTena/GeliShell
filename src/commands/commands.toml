category    = "filesystem"
translate   = { bash = { exact = "mkdir", suggestions = ["install -d"] }, zsh = { exact = "mkdir", suggestions = ["install -d"] }, fish = { exact = "mkdir", suggestions = ["install -d"] }, powershell = { exact = "New-Item -ItemType Directory", suggestions = ["ni -ItemType Directory", "mkdir"] }, cmd = { exact = "mkdir", suggestions = ["md"] } }

[[commands.flags]]
