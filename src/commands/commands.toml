translate   = { bash = { exact = "kill", suggestions = ["kill -9", "pkill"] }, zsh = { exact = "kill", suggestions = ["kill -9", "pkill"] }, fish = { exact = "kill", suggestions = ["kill -9", "pkill"] }, powershell = { exact = "Stop-Process -Id", suggestions = ["spps", "kill"] }, cmd = { exact = "taskkill /PID", suggestions = ["taskkill /F /PID"] } }

