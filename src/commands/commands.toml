# commands/commands.toml
# GeliShell Command Translation Map v0.1.0

[meta]
version     = "0.1.0"
description = "GeliShell canonical command translation map"

# ══════════════════════════════════════════════
# filesystem
# ══════════════════════════════════════════════

[[commands]]
name        = "list"
description = "List directory contents"
category    = "filesystem"
translate   = { bash = { exact = "ls", suggestions = ["ls -la", "ls -lh"] }, zsh = { exact = "ls", suggestions = ["ls -la", "ls -lh"] }, fish = { exact = "ls", suggestions = ["ls -la", "ls -lh"] }, powershell = { exact = "Get-ChildItem", suggestions = ["gci", "dir", "ls"] }, cmd = { exact = "dir", suggestions = ["dir /w", "dir /b"] } }

[[commands.flags]]
canonical  = "--all"
bash       = "-a"
zsh        = "-a"
fish       = "-a"
powershell = "-Force"
cmd        = "/a"

[[commands.flags]]
canonical  = "--long"
bash       = "-l"
zsh        = "-l"
fish       = "-l"
powershell = "| Format-List"

[[commands.flags]]
canonical  = "--human-readable"
bash       = "-lh"
zsh        = "-lh"
fish       = "-lh"

[[commands.flags]]
canonical  = "--recursive"
bash       = "-R"
zsh        = "-R"
fish       = "-R"
powershell = "-Recurse"
cmd        = "/s"

# ──────────────────────────────────────────────

[[commands]]
name        = "change-dir"
description = "Change the current working directory"
category    = "filesystem"
translate   = { bash = { exact = "cd", suggestions = ["pushd", "popd"] }, zsh = { exact = "cd", suggestions = ["pushd", "popd"] }, fish = { exact = "cd", suggestions = ["pushd", "popd"] }, powershell = { exact = "Set-Location", suggestions = ["sl", "cd", "chdir"] }, cmd = { exact = "cd", suggestions = ["chdir"] } }

[[commands.flags]]
canonical  = "--home"
bash       = "~"
zsh        = "~"
fish       = "~"
powershell = "$HOME"
cmd        = "%USERPROFILE%"

[[commands.flags]]
canonical  = "--back"
bash       = "-"
zsh        = "-"
fish       = "-"
powershell = "-"

# ──────────────────────────────────────────────

[[commands]]
name        = "print-dir"
description = "Print the current working directory path"
category    = "filesystem"
translate   = { bash = { exact = "pwd", suggestions = ["echo $PWD"] }, zsh = { exact = "pwd", suggestions = ["echo $PWD"] }, fish = { exact = "pwd", suggestions = ["echo $PWD"] }, powershell = { exact = "Get-Location", suggestions = ["gl", "pwd"] }, cmd = { exact = "cd", suggestions = ["echo %CD%"] } }

# ──────────────────────────────────────────────

[[commands]]
