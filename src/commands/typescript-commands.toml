translate   = {
    bash       = { exact = "tsc --build", suggestions = ["tsc --build --verbose"] },
    zsh        = { exact = "tsc --build", suggestions = ["tsc --build --verbose"] },
    fish       = { exact = "tsc --build", suggestions = ["tsc --build --verbose"] },
    powershell = { exact = "tsc --build", suggestions = ["tsc --build --verbose"] },
    cmd        = { exact = "tsc --build", suggestions = ["tsc --build --verbose"] }
}

[[commands.flags]]
canonical  = "--build"
bash       = "--build"
zsh        = "--build"
fish       = "--build"
powershell = "--build"
cmd        = "--build"

[[commands.flags]]
