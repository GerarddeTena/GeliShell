translate   = { bash = { exact = "dotnet restore", suggestions = ["dotnet restore --force"] }, zsh = { exact = "dotnet restore", suggestions = ["dotnet restore --force"] }, fish = { exact = "dotnet restore", suggestions = ["dotnet restore --force"] }, powershell = { exact = "dotnet restore", suggestions = ["dotnet restore --force"] }, cmd = { exact = "dotnet restore", suggestions = ["dotnet restore --force"] } }

