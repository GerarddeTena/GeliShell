name: Supply Chain

on:
  pull_request:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5.0.1

      - uses: EmbarkStudios/cargo-deny-action@v2