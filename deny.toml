# ------------------------------------------------------------
# Cargo Deny Configuration
# Compatible with cargo-deny >= 0.14
# ------------------------------------------------------------

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

# ------------------------------------------------------------
# Security advisories
# ------------------------------------------------------------
[advisories]
yanked = "deny"
unsound = "all"
unmaintained = "workspace"

# ------------------------------------------------------------
# License policy
# ------------------------------------------------------------
[licenses]
# Minimum confidence for license detection
confidence-threshold = 0.8

# ONLY licenses explicitly allowed.
# Everything else (GPL, AGPL, CC, custom, missing) is denied by default.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",           # option-ext (transitive via dirs)
    "CDLA-Permissive-2.0", # webpki-roots (transitive via reqwest/rustls)
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

# Warn if allowlist contains licenses that are not used
unused-allowed-license = "warn"

# geli_shell uses a custom non-SPDX license identifier — exempt from the
# allow list check since it applies only to distribution, not dependencies.
[[licenses.exceptions]]
name = "geli_shell"
version = "*"
allow = ["LicenseRef-NC"]

# ------------------------------------------------------------
# Dependency graph hygiene
# ------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# ------------------------------------------------------------
# Source policy (supply chain)
# All dependencies come from crates.io — no git sources allowed.
# ------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"