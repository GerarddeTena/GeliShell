# ------------------------------------------------------------
# Cargo Deny Configuration
# Compatible with cargo-deny >= 0.14
# ------------------------------------------------------------

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

# ------------------------------------------------------------
# Security advisories
# ------------------------------------------------------------
[advisories]
yanked = "deny"
unsound = "all"
unmaintained = "workspace"

# ------------------------------------------------------------
# License policy
# ------------------------------------------------------------
[licenses]
# Minimum confidence for license detection
confidence-threshold = 0.8

# ONLY licenses explicitly allowed.
# Everything else (GPL, AGPL, CC, custom, missing) is denied by default.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

# Warn if allowlist contains licenses that are not used
unused-allowed-license = "warn"

# ------------------------------------------------------------
# Dependency graph hygiene
# ------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# ------------------------------------------------------------
# Source policy (supply chain)
# ------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
github = [
    "rust-lang",
    "tokio-rs",
    "serde-rs",
]