[meta]
name = "typescript"
description = "Pure TypeScript compiler (tsc) commands only"
levels = ["beginner", "intermediate", "advanced"]

# --- BEGINNER ---

[[ops]]
operation = "init tsconfig"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --init"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --init"
[[ops.commands]]
subsystem = "cmd"
command = "tsc --init"

[[ops]]
operation = "compile project"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc"
[[ops.commands]]
subsystem = "powershell"
command = "tsc"
[[ops.commands]]
subsystem = "cmd"
command = "tsc"

[[ops]]
operation = "compile single file"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc <File.ts>"
[[ops.commands]]
subsystem = "powershell"
command = "tsc <File.ts>"
[[ops.commands]]
subsystem = "cmd"
command = "tsc <File.ts>"

# --- INTERMEDIATE ---

[[ops]]
operation = "watch mode"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc -w"
[[ops.commands]]
subsystem = "powershell"
command = "tsc -w"
[[ops.commands]]
subsystem = "cmd"
command = "tsc -w"

[[ops]]
operation = "type check only"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --noEmit"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --noEmit"
[[ops.commands]]
subsystem = "cmd"
command = "tsc --noEmit"

[[ops]]
operation = "set target version"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --target <Version>"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --target <Version>"
[[ops.commands]]
subsystem = "cmd"
command = "tsc --target <Version>"

[[ops]]
operation = "set module system"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --module <Type>"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --module <Type>"
[[ops.commands]]
subsystem = "cmd"
command = "tsc --module <Type>"

[[ops]]
operation = "set output directory"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --outDir <Folder>"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --outDir <Folder>"
[[ops.commands]]
subsystem = "cmd"
command = "tsc --outDir <Folder>"

[[ops]]
operation = "strict mode"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --strict"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --strict"
[[ops.commands]]
subsystem = "cmd"
command = "tsc --strict"

# --- ADVANCED ---

[[ops]]
operation = "build composite project"
level = "advanced"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --build"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --build"
[[ops.commands]]
subsystem = "cmd"
command = "tsc --build"

[[ops]]
operation = "clean build cache"
level = "advanced"
[[ops.commands]]
subsystem = "bash/zsh"
command = "tsc --build --clean"
[[ops.commands]]
subsystem = "powershell"
command = "tsc --build --clean"
[[ops.commands]]
subsystem = "cmd"
