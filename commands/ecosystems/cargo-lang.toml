[meta]
name = "cargo"
description = "Rust and Cargo commands"
levels = ["beginner", "intermediate", "advanced"]

# --- BEGINNER ---

[[ops]]
operation = "new binary project"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "cargo new <ProjectName> --bin"
[[ops.commands]]
subsystem = "powershell"
command = "cargo new <ProjectName> --bin"
[[ops.commands]]
subsystem = "cmd"
command = "cargo new <ProjectName> --bin"

