[meta]
name = "docker"
description = "Docker container commands"
levels = ["beginner", "intermediate", "advanced"]

# --- BEGINNER ---

[[ops]]
operation = "run container interactive"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker run -it <ImageName> bash"
[[ops.commands]]
subsystem = "powershell"
command = "docker run -it <ImageName> bash"
[[ops.commands]]
subsystem = "cmd"
command = "docker run -it <ImageName> bash"

[[ops]]
operation = "run container detached"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker run -d --name <Name> <ImageName>"
[[ops.commands]]
subsystem = "powershell"
command = "docker run -d --name <Name> <ImageName>"
[[ops.commands]]
subsystem = "cmd"
command = "docker run -d --name <Name> <ImageName>"

[[ops]]
operation = "list running containers"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker ps"
[[ops.commands]]
subsystem = "powershell"
command = "docker ps"
[[ops.commands]]
subsystem = "cmd"
command = "docker ps"

[[ops]]
operation = "list all containers"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker ps -a"
[[ops.commands]]
subsystem = "powershell"
command = "docker ps -a"
[[ops.commands]]
subsystem = "cmd"
command = "docker ps -a"

[[ops]]
operation = "pull image"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker pull <ImageName>"
[[ops.commands]]
subsystem = "powershell"
command = "docker pull <ImageName>"
[[ops.commands]]
subsystem = "cmd"
command = "docker pull <ImageName>"

# --- INTERMEDIATE ---

[[ops]]
operation = "stop container"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker stop <ContainerID>"
[[ops.commands]]
subsystem = "powershell"
command = "docker stop <ContainerID>"
[[ops.commands]]
subsystem = "cmd"
command = "docker stop <ContainerID>"

[[ops]]
operation = "remove container"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker rm <ContainerID>"
[[ops.commands]]
subsystem = "powershell"
command = "docker rm <ContainerID>"
[[ops.commands]]
subsystem = "cmd"
command = "docker rm <ContainerID>"

[[ops]]
operation = "remove image"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker rmi <ImageName>"
[[ops.commands]]
subsystem = "powershell"
command = "docker rmi <ImageName>"
[[ops.commands]]
subsystem = "cmd"
command = "docker rmi <ImageName>"

[[ops]]
operation = "view logs"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker logs -f <ContainerID>"
[[ops.commands]]
subsystem = "powershell"
command = "docker logs -f <ContainerID>"
[[ops.commands]]
subsystem = "cmd"
command = "docker logs -f <ContainerID>"

[[ops]]
operation = "execute command"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker exec -it <ContainerID> <Command>"
[[ops.commands]]
subsystem = "powershell"
command = "docker exec -it <ContainerID> <Command>"
[[ops.commands]]
subsystem = "cmd"
command = "docker exec -it <ContainerID> <Command>"

[[ops]]
operation = "build image"
level = "intermediate"
[[ops.commands]]
subsystem = "bash/zsh"
command = "docker build -t <TagName> ."
[[ops.commands]]
subsystem = "powershell"
command = "docker build -t <TagName> ."
[[ops.commands]]
subsystem = "cmd"
command = "docker build -t <TagName> ."

