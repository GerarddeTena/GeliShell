[[ops.commands]]
subsystem = "cmd"
command = "dotnet build"

[[ops]]
operation = "run project"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "dotnet run"
[[ops.commands]]
subsystem = "powershell"
