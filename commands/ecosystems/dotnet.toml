[[ops.commands]]
subsystem = "cmd"
command = "dotnet run"

[[ops]]
operation = "test project"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "dotnet test"
[[ops.commands]]
subsystem = "powershell"
command = "dotnet test"
[[ops.commands]]
subsystem = "cmd"
command = "dotnet test"

