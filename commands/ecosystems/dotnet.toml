[meta]
name = "dotnet"
description = ".NET CLI commands"
levels = ["beginner", "intermediate", "advanced"]

# --- BEGINNER ---

[[ops]]
operation = "new console app"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "dotnet new console -n <ProjectName>"
[[ops.commands]]
subsystem = "powershell"
command = "dotnet new console -n <ProjectName>"
[[ops.commands]]
subsystem = "cmd"
command = "dotnet new console -n <ProjectName>"

[[ops]]
operation = "new class library"
level = "beginner"
[[ops.commands]]
subsystem = "bash/zsh"
command = "dotnet new classlib -n <ProjectName>"
[[ops.commands]]
subsystem = "powershell"
command = "dotnet new classlib -n <ProjectName>"
[[ops.commands]]
subsystem = "cmd"
command = "dotnet new classlib -n <ProjectName>"

[[ops]]
